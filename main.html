<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <header>
      <h1>String<span>Chop</span></h1>
      <p class="subtitle">Split any string into equal-length chunks</p>
    </header>

    <!-- Input String Card -->
    <div class="card">
      <label for="inputStr">Input String</label>
      <input type="text" id="inputStr" placeholder='e.g. Hello, world!' />
      <div class="error-msg" id="error-msg"></div>
    </div>

    <!-- Chunk Size + Button Card -->
    <div class="card">
      <div class="row">
        <div>
          <label for="chunkSize">Chunk Size</label>
          <input type="number" id="chunkSize" min="1" value="5" />
        </div>
        <button onclick="runChop()">Chop →</button>
      </div>
    </div>

    <!-- Output Display -->
    <div class="output-section">
      <div class="output-header">
        <span>Output Chunks</span>
        <span id="chunk-count">—</span>
      </div>
      <div class="output-body" id="output">
        <span class="empty-state">Chunks will appear here…</span>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
  <script>
    /* UI logic: calls stringChop() and renders colored pills */
  </script>
</body>

</html>
